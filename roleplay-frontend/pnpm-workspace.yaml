packages:
  - 'apps/*'
  - 'libs/*'

# Local dev consumes @rusty-view/* from a local verdaccio registry where
# packages are (re)published moments before install, so the supply-chain
# release-age gate does not apply here.
minimumReleaseAge: 0

minimumReleaseAgeExclude:
  - '@nx/angular@23.0.1'
  - '@nx/devkit@23.0.1'
  - '@nx/docker@23.0.1'
  - '@nx/esbuild@23.0.1'
  - '@nx/eslint-plugin@23.0.1'
  - '@nx/eslint@23.0.1'
  - '@nx/jest@23.0.1'
  - '@nx/js@23.0.1'
  - '@nx/module-federation@23.0.1'
  - '@nx/node@23.0.1'
  - '@nx/nx-darwin-arm64@23.0.1'
  - '@nx/nx-darwin-x64@23.0.1'
  - '@nx/nx-freebsd-x64@23.0.1'
  - '@nx/nx-linux-arm-gnueabihf@23.0.1'
  - '@nx/nx-linux-arm64-gnu@23.0.1'
  - '@nx/nx-linux-arm64-musl@23.0.1'
  - '@nx/nx-linux-x64-gnu@23.0.1'
  - '@nx/nx-linux-x64-musl@23.0.1'
  - '@nx/nx-win32-arm64-msvc@23.0.1'
  - '@nx/nx-win32-x64-msvc@23.0.1'
  - '@nx/playwright@23.0.1'
  - '@nx/rspack@23.0.1'
  - '@nx/vite@23.0.1'
  - '@nx/vitest@23.0.1'
  - '@nx/web@23.0.1'
